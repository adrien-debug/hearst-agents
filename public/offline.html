<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>Hors ligne — Hearst</title>
    <style>
      :root {
        --bg: #000000;
        --text: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.65);
        --text-faint: rgba(255, 255, 255, 0.45);
        --cykan: #2dd4bf;
        --border-default: rgba(255, 255, 255, 0.08);
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-6: 24px;
        --space-8: 32px;
        --radius-md: 12px;
        --radius-pill: 9999px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Satoshi", "Inter",
          system-ui, sans-serif;
        min-height: 100vh;
      }
      .shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--space-6);
        min-height: 100vh;
        padding: var(--space-8);
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-4);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-pill);
        color: var(--cykan);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: var(--radius-pill);
        background: var(--cykan);
      }
      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: -0.01em;
        max-width: 520px;
      }
      p {
        margin: 0;
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 420px;
      }
      button {
        appearance: none;
        cursor: pointer;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--cykan);
        border-radius: var(--radius-md);
        padding: var(--space-3) var(--space-6);
        font-size: 14px;
        letter-spacing: 0.01em;
        transition: background 200ms ease;
      }
      button:hover {
        background: rgba(45, 212, 191, 0.08);
      }
      .meta {
        color: var(--text-faint);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <span class="badge"><span class="dot"></span>Hors ligne</span>
      <h1>Mode hors ligne — connexion indisponible</h1>
      <p>
        Hearst tourne sans réseau pour l'instant. Les assets récents restent
        accessibles depuis le cache. Réessaye dès que la connexion revient.
      </p>
      <button type="button" onclick="location.reload()">Réessayer</button>
      <span class="meta">Hearst OS · PWA</span>
    </main>
    <script>
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
