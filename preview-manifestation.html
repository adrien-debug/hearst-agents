<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEARST OS V2 — Reference Layout</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  .shell { display: flex; height: 100vh; }

  /* ── SIDEBAR ─────────────────────────────────── */
  .sidebar {
    width: 220px;
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }
  .sidebar-logo {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.7);
  }
  .sidebar-workspace {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; color: rgba(255,255,255,0.5);
  }
  .sidebar-threads { flex: 1; overflow-y: auto; padding: 8px 0; }
  .tg-label {
    padding: 16px 20px 4px;
    font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.15em; color: rgba(255,255,255,0.35);
  }
  .t-row {
    padding: 6px 20px;
    cursor: pointer;
    position: relative;
  }
  .t-row .t-title {
    font-size: 11px; line-height: 1.3;
    color: rgba(255,255,255,0.40);
    transition: color 0.2s;
  }
  .t-row:hover .t-title { color: rgba(255,255,255,0.65); }
  .t-row.active .t-title { color: rgba(255,255,255,0.95); }
  .t-row.active::before {
    content: ''; position: absolute;
    left: 8px; top: 50%; transform: translateY(-50%);
    width: 1.5px; height: 12px;
    background: rgba(255,255,255,0.4); border-radius: 1px;
  }
  .sidebar-footer {
    padding: 12px; flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  .sidebar-ops {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 8px;
    color: rgba(255,255,255,0.25);
    font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.1em; text-decoration: none;
  }
  .sidebar-ops:hover { color: rgba(255,255,255,0.45); }

  /* ── CENTER ──────────────────────────────────── */
  .center {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; overflow: hidden;
  }
  .top-bar {
    height: 40px; display: flex; align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }
  .top-bar-label {
    font-size: 11px; font-family: ui-monospace, monospace;
    color: white;
  }
  .stage-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 200px; padding: 0 24px;
  }

  /* Nucleus */
  .nucleus { width: 160px; height: 160px; position: relative; margin-bottom: 24px; }
  .n-outer {
    position: absolute; inset: 0; border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.18);
    transition: opacity 0.48s ease-out, border-color 0.48s ease-out;
  }
  .n-inner {
    position: absolute; inset: 20px; border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.08);
    opacity: 0.3;
    transition: opacity 0.48s ease-out;
  }
  .n-dot {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: white; opacity: 0.45;
    transition: opacity 0.48s ease-out;
  }
  .nucleus.condensing .n-outer { border-color: rgba(255,255,255,0.28); opacity: 0.95; }
  .nucleus.condensing .n-inner { opacity: 0.7; }
  .nucleus.condensing .n-dot   { opacity: 0.65; }
  .nucleus.ready .n-outer { border-color: rgba(255,255,255,0.30); }
  .nucleus.ready .n-dot   { opacity: 0.85; }

  .s-primary {
    font-size: 20px; font-weight: 300;
    color: rgba(255,255,255,0.88);
    letter-spacing: -0.01em; margin-bottom: 6px;
    text-align: center;
  }
  .s-secondary {
    font-size: 12px; color: rgba(255,255,255,0.40);
    font-weight: 300; max-width: 280px;
    text-align: center; line-height: 1.5;
  }

  /* Chat bottom */
  .chat-area {
    flex-shrink: 0; padding: 0 16px 24px;
    max-width: 768px; margin: 0 auto; width: 100%;
  }
  .halo-bar {
    display: flex; align-items: center; justify-content: center;
    height: 40px; gap: 20px; margin-bottom: 16px;
  }
  .h-core {
    width: 48px; height: 48px; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .h-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .h-ring.on {
    border-color: rgba(245,158,11,0.5);
    animation: hb 1.2s ease-in-out infinite;
  }
  @keyframes hb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  .h-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }
  .h-dot.on { background: rgba(255,255,255,0.50); }
  .h-prov {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.30);
  }
  .h-prov.on { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); opacity: 1; }
  .h-flow {
    font-size: 8px; font-family: ui-monospace, monospace;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45);
  }
  .input-bar {
    display: flex; align-items: center;
    height: 80px; border-top: 1px solid rgba(255,255,255,0.05);
    padding: 0 48px;
  }
  .input-caret {
    color: rgba(255,255,255,0.30);
    font-family: ui-monospace, monospace; font-size: 14px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50%{opacity:0} }

  /* ── RIGHT PANEL ─────────────────────────────── */
  .right-panel {
    width: 380px;
    border-left: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .rp-header {
    height: 48px; display: flex; align-items: center;
    justify-content: flex-end; padding: 0 24px; flex-shrink: 0;
  }
  .rp-dot {
    width: 5px; height: 5px; border-radius: 50%;
    transition: background 0.5s;
  }
  .rp-body {
    flex: 1; padding: 0 24px; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* Focal */
  .focal {
    cursor: pointer;
    border: 1px solid transparent; border-radius: 2px;
    transition: border-color 0.15s;
    padding: 0 0 24px;
  }
  .focal:hover { border-color: rgba(255,255,255,0.08); }
  .f-status-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .f-status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.50);
  }
  .f-status-dot.composing { background: rgba(245,158,11,0.6); }
  .f-type {
    font-size: 9px; font-family: ui-monospace, monospace;
    text-transform: uppercase; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.45);
  }
  .f-title {
    font-size: 18px; font-weight: 500;
    color: rgba(255,255,255,0.90);
    letter-spacing: -0.01em; line-height: 1.3;
    margin-bottom: 10px;
  }
  .f-summary {
    font-size: 13px; color: rgba(255,255,255,0.50);
    line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .f-prov {
    margin-top: 14px;
    font-size: 10px; font-family: ui-monospace, monospace;
    color: rgba(255,255,255,0.22);
  }

  .rp-divider { border-top: 1px solid rgba(255,255,255,0.05); margin: 24px 0; }

  /* Secondary items */
  .sec {
    display: flex; justify-content: space-between; align-items: center;
    height: 40px; padding: 0 8px;
    border: 1px solid transparent; border-radius: 2px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .sec:hover { border-color: rgba(255,255,255,0.08); }
  .sec-title {
    font-size: 12px; color: rgba(255,255,255,0.50);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; padding-right: 16px; transition: color 0.15s;
  }
  .sec:hover .sec-title { color: rgba(255,255,255,0.75); }
  .sec-time {
    font-size: 11px; font-family: ui-monospace, monospace;
    color: rgba(255,255,255,0.25); flex-shrink: 0;
  }

  /* Empty panel */
  .rp-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .rp-empty-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.10);
    transition: background 0.5s;
  }
  .rp-empty-dot.on { background: rgba(255,255,255,0.40); }
  .rp-empty-label {
    font-size: 10px; font-family: ui-monospace, monospace;
    color: rgba(255,255,255,0.30); letter-spacing: 0.1em;
    max-width: 160px; text-align: center;
  }

  /* Noise */
  .noise {
    position: fixed; inset: 0; pointer-events: none;
    z-index: 999; opacity: 0.02;
  }

  /* Toggle */
  .toggle {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%); z-index: 100;
    display: flex; gap: 8px;
  }
  .tbtn {
    padding: 6px 14px;
    font-size: 10px; font-family: ui-monospace, monospace;
    text-transform: uppercase; letter-spacing: 0.12em;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.9); color: rgba(255,255,255,0.45);
    cursor: pointer; border-radius: 2px;
    transition: border-color 0.15s, color 0.15s;
  }
  .tbtn.on {
    border-color: rgba(255,255,255,0.30);
    color: rgba(255,255,255,0.85);
  }
</style>
</head>
<body>
<div class="shell">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">H</div>
      <span class="sidebar-workspace">Hearst</span>
    </div>
    <div class="sidebar-threads">
      <div class="tg-label">Aujourd'hui</div>
      <div class="t-row active"><span class="t-title">Résumé emails du matin</span></div>
      <div class="t-row"><span class="t-title">Brief produit Q2</span></div>
      <div class="t-row"><span class="t-title">Analyse concurrence</span></div>
      <div class="tg-label">Hier</div>
      <div class="t-row"><span class="t-title">Rapport financier hebdo</span></div>
      <div class="t-row"><span class="t-title">Veille marché crypto</span></div>
    </div>
    <div class="sidebar-footer">
      <a class="sidebar-ops" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px;flex-shrink:0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 011.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.56.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.893.149c-.425.07-.765.383-.93.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 01-1.449.12l-.738-.527c-.35-.25-.806-.272-1.204-.107-.397.165-.71.505-.78.929l-.15.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 01-.12-1.45l.527-.737c.25-.35.273-.806.108-1.204-.165-.397-.506-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.107-1.204l-.527-.738a1.125 1.125 0 01.12-1.45l.773-.773a1.125 1.125 0 011.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Ops
      </a>
    </div>
  </div>

  <!-- ── CENTER ── -->
  <div class="center">
    <div class="top-bar"><span class="top-bar-label">HEARST OS</span></div>

    <div class="stage-area">
      <div class="nucleus" id="nucleus">
        <div class="n-outer"></div>
        <div class="n-inner"></div>
        <div class="n-dot"></div>
      </div>
      <div class="s-primary" id="primary">Bon après-midi, Adrien</div>
      <div class="s-secondary" id="secondary">Tout est en place. Dites ce dont vous avez besoin.</div>
    </div>

    <div class="chat-area">
      <div class="halo-bar">
        <div class="h-core">
          <div class="h-ring" id="hring"></div>
          <div class="h-dot" id="hdot"></div>
        </div>
        <div style="display:flex;gap:10px" id="provs"></div>
        <div class="h-flow" id="flow"></div>
      </div>
      <div class="input-bar"><span class="input-caret">█</span></div>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel">
    <div class="rp-header"><div class="rp-dot" id="rpdot" style="background:rgba(255,255,255,0.15)"></div></div>
    <div class="rp-body" id="rpbody"></div>
  </div>
</div>

<!-- Noise -->
<svg class="noise" aria-hidden="true">
  <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#n)"/>
</svg>

<!-- State toggle -->
<div class="toggle">
  <button class="tbtn on" id="b-idle" onclick="go('idle')">Idle</button>
  <button class="tbtn" id="b-active" onclick="go('active')">Active</button>
  <button class="tbtn" id="b-ready" onclick="go('ready')">Ready</button>
</div>

<script>
const $ = id => document.getElementById(id);

const FOCAL_HTML = `
  <div class="focal">
    <div class="f-status-row">
      <div class="f-status-dot STATUS_CLASS"></div>
      <span class="f-type">Synthèse</span>
    </div>
    <div class="f-title">Résumé de tes 10 derniers emails</div>
    <div class="f-summary">À traiter en priorité — Vercel : 4 échecs de déploiement en production. Tu as reçu 3 messages Slack concernant la release Q2. Le rapport financier hebdomadaire est disponible.</div>
    <div class="f-prov">via Gmail · il y a 7h</div>
  </div>
  <div class="rp-divider"></div>
  <div class="sec">
    <span class="sec-title">Synthèse : Résume mes derniers emails</span>
    <span class="sec-time">16:12</span>
  </div>
  <div class="sec">
    <span class="sec-title">Brief produit : Analyse Q2</span>
    <span class="sec-time">15:44</span>
  </div>
  <div class="sec">
    <span class="sec-title">Veille : Rapport marché crypto</span>
    <span class="sec-time">14:20</span>
  </div>
`;

function go(s) {
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  $('b-'+s).classList.add('on');

  const nuc = $('nucleus');
  nuc.className = 'nucleus';

  $('hring').className = 'h-ring';
  $('hdot').className = 'h-dot';
  $('provs').innerHTML = '';
  $('flow').textContent = '';

  if (s === 'idle') {
    $('primary').textContent = 'Bon après-midi, Adrien';
    $('secondary').textContent = 'Tout est en place. Dites ce dont vous avez besoin.';
    $('rpdot').style.background = 'rgba(255,255,255,0.12)';
    $('rpbody').innerHTML = `
      <div class="rp-empty">
        <div class="rp-empty-dot"></div>
        <div class="rp-empty-label">En veille</div>
      </div>`;
  }

  if (s === 'active') {
    nuc.classList.add('condensing');
    $('primary').textContent = 'Résumé de vos emails';
    $('secondary').textContent = "L\u2019objet prend corps.";
    $('hring').classList.add('on');
    $('hdot').classList.add('on');
    $('flow').textContent = 'SYNTHESIZING';
    $('provs').innerHTML = `
      <div class="h-prov on">G</div>
      <div class="h-prov" style="opacity:0.5">S</div>`;
    $('rpdot').style.background = 'rgba(255,255,255,0.40)';
    $('rpbody').innerHTML = FOCAL_HTML.replace('STATUS_CLASS', 'composing');
  }

  if (s === 'ready') {
    nuc.classList.add('ready');
    $('primary').textContent = 'Résumé de vos emails';
    $('secondary').textContent = 'Visible à droite.';
    $('rpdot').style.background = 'rgba(255,255,255,0.40)';
    $('rpbody').innerHTML = FOCAL_HTML.replace('STATUS_CLASS', '');
  }
}

go('idle');
</script>
</body>
</html>
