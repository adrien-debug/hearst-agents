<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearst OS - Premium Halo Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #09090b; /* Le vrai dark de ta vision */
            color: #e0e0e0;
        }
        
        /* Le vrai Halo (L'Oeil / Le Core) */
        .halo-core {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* La lueur diffuse derrière */
        .halo-glow {
            position: absolute;
            inset: -50px;
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: breathe 4s ease-in-out infinite;
        }

        /* L'anneau rotatif subtil */
        .halo-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-top-color: rgba(0, 229, 255, 0.4);
            animation: spin 8s linear infinite;
        }

        /* Le symbole central ◉ */
        .halo-symbol {
            font-size: 3rem;
            color: #00e5ff;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            animation: pulse-opacity 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse-opacity {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* L'input flottant premium */
        .floating-input-wrapper {
            background: rgba(20, 20, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .floating-input-wrapper:focus-within {
            border-color: rgba(0, 229, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 229, 255, 0.1), 0 0 0 1px rgba(0, 229, 255, 0.1) inset;
            transform: translateY(-2px);
        }

        /* Suggestions chips */
        .chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }
        .chip:hover {
            background: rgba(0, 229, 255, 0.05);
            border-color: rgba(0, 229, 255, 0.2);
            color: #fff;
        }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex antialiased">

    <!-- SIDEBAR GAUCHE (Reprise de ta structure) -->
    <aside class="w-64 flex-shrink-0 border-r border-white/5 bg-[#0c0c10] flex flex-col">
        <div class="p-6 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-[#00e5ff]/10 text-[#00e5ff] flex items-center justify-center font-bold text-sm border border-[#00e5ff]/20">H</div>
            <div>
                <h1 class="text-sm font-semibold text-white">Hearst OS</h1>
                <p class="text-xs text-zinc-500">Bonjour, Adrien</p>
            </div>
        </div>
        <!-- Reste de la sidebar... -->
        <nav class="px-4 py-2 space-y-1">
            <div class="px-3 py-2 rounded-lg bg-white/5 text-white text-sm font-medium border border-white/5">Accueil</div>
            <div class="px-3 py-2 rounded-lg text-zinc-500 text-sm hover:text-white transition-colors">Messages</div>
        </nav>
    </aside>

    <!-- ZONE CENTRALE : L'ÉTAT IDLE (Le vrai Halo) -->
    <main class="flex-1 relative flex flex-col items-center justify-center bg-[#09090b]">
        
        <!-- LE HALO CORE (L'Oeil de l'IA) -->
        <div class="halo-core mb-12">
            <div class="halo-glow"></div>
            <div class="halo-ring"></div>
            <div class="halo-symbol">◉</div>
        </div>

        <!-- Titre d'accueil -->
        <h2 class="text-2xl font-medium text-white mb-2 tracking-tight">Bonjour, Adrien</h2>
        <p class="text-zinc-500 mb-10 text-sm">Que puis-je faire pour vous aujourd'hui ?</p>

        <!-- L'Input Flottant -->
        <div class="w-full max-w-2xl px-6">
            <div class="floating-input-wrapper rounded-2xl p-2 flex flex-col">
                <input 
                    type="text" 
                    placeholder="Posez une question, demandez une analyse..." 
                    class="w-full bg-transparent text-white placeholder-zinc-600 text-lg px-4 py-3 focus:outline-none"
                >
                
                <!-- Suggestions intégrées sous l'input -->
                <div class="flex gap-2 px-4 pb-3 pt-2 overflow-x-auto">
                    <button class="chip px-3 py-1.5 rounded-full text-xs text-zinc-400 whitespace-nowrap flex items-center gap-2">
                        <span class="text-[#00e5ff]">📊</span> Analyser mes ventes
                    </button>
                    <button class="chip px-3 py-1.5 rounded-full text-xs text-zinc-400 whitespace-nowrap flex items-center gap-2">
                        <span class="text-[#00e5ff]">📝</span> Résumer mes emails
                    </button>
                    <button class="chip px-3 py-1.5 rounded-full text-xs text-zinc-400 whitespace-nowrap flex items-center gap-2">
                        <span class="text-[#00e5ff]">🤖</span> Créer un rapport
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- SIDEBAR DROITE -->
    <aside class="w-80 flex-shrink-0 border-l border-white/5 bg-[#0c0c10] p-6 flex flex-col gap-8">
        <div>
            <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-600 mb-4">Runtime</h3>
            <div class="flex items-center gap-2 text-zinc-500 text-sm">
                <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
                Inactif
            </div>
        </div>
    </aside>

</body>
</html>
